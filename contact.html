<!DOCTYPE html>
<html>
<head>
<title>Contact Me</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff9a9e,#a18cd1);
margin:0;
}

/* Form Container */

.container{
width:60%;
margin:auto;
margin-top:60px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* Heading */

h1{
text-align:center;
color:#d63384;
}

/* Inputs */

input, textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border-radius:6px;
border:1px solid #ccc;
}

/* Button */

button{
background:#d63384;
color:white;
border:none;
padding:12px 25px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#b0266b;
}
</style>
</head>

<body>

<div class="container">

<h1>Contact Me</h1>

<form>

<label>Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Message</label>
<textarea rows="5" placeholder="Write your message"></textarea>

<button type="submit">Send Message</button>

</form>

</html>
